# longform.yml — Long-form video pipeline dispatcher
# Triggered by supabase/functions/trigger-longform (signal-studio repo).
# Each stage is idempotent and resumable — re-dispatch picks up from DB state.
#
# Required secrets (reel-pipeline repo → Settings → Secrets):
#   SIGNAL_STUDIO_DEPLOY_KEY   — deploy key for checking out signal-studio
#   SUPABASE_URL               — https://nnxtvbolhuvihlpwppbj.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY  — service role key (not anon)
#   ANTHROPIC_KEY              — Anthropic API key (or proxy key)
#   ANTHROPIC_BASE_URL         — (optional) proxy base URL
#   ANTHROPIC_MODEL            — (optional) model override
#   R2_ACCOUNT_ID              — Cloudflare R2 account ID
#   R2_ACCESS_KEY_ID           — R2 access key
#   R2_SECRET_ACCESS_KEY       — R2 secret key
#   R2_BUCKET_RENDERED         — R2 bucket name
#   R2_PUBLIC_BASE_URL         — R2 public URL prefix
#   FAL_KEY                    — set to any non-empty dummy string (satisfies config schema)
#
# Optional secrets (only needed for publish stage):
#   YT_CLIENT_ID               — YouTube OAuth client ID
#   YT_CLIENT_SECRET           — YouTube OAuth client secret
#   YT_REFRESH_TOKEN_FOOTBALL  — YouTube refresh token for the football channel

name: longform

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'content_items.id of the longform project'
        required: true
        type: string
      stage:
        description: 'Pipeline stage to run'
        required: true
        type: choice
        options:
          - noop
          - seed
          - tts
          - assemble
          - publish
      signal_studio_ref:
        description: 'signal-studio branch/tag to check out'
        required: false
        default: 'feat/longform-v2'
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout reel-pipeline
        uses: actions/checkout@v4

      - name: Checkout signal-studio
        uses: actions/checkout@v4
        with:
          repository: jayampathiw/signal-studio
          ssh-key: ${{ secrets.SIGNAL_STUDIO_DEPLOY_KEY }}
          ref: ${{ inputs.signal_studio_ref || 'feat/longform-v2' }}
          path: signal-studio

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache npm store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('signal-studio/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: signal-studio
        run: npm ci

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Cache Kokoro model
        uses: actions/cache@v4
        with:
          path: ~/.cache/kokoro
          key: kokoro-model-v1

      - name: Install Kokoro TTS
        run: pip install kokoro-onnx soundfile numpy --quiet

      - name: Run stage — ${{ inputs.stage }}
        working-directory: signal-studio
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_RENDERED: ${{ secrets.R2_BUCKET_RENDERED }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          PROJECT_ID="${{ inputs.project_id }}"
          STAGE="${{ inputs.stage }}"
          echo "▶ stage=$STAGE project=$PROJECT_ID"

          case "$STAGE" in
            noop)
              node scripts/set-status.mjs --project "$PROJECT_ID" --status "$(node -e "
                const {createClient}=require('@supabase/supabase-js');
                const db=createClient(process.env.SUPABASE_URL,process.env.SUPABASE_SERVICE_ROLE_KEY);
                db.from('content_items').select('status').eq('id',$PROJECT_ID).single().then(({data})=>process.stdout.write(data.status));
              ")" --note "noop verified"
              echo "noop complete"
              ;;
            seed)
              node apps/video/scripts/longform/seed-stills-v2.mjs --project "$PROJECT_ID"
              node apps/video/scripts/longform/generate-tts.mjs --project "$PROJECT_ID" --report
              node scripts/set-status.mjs --project "$PROJECT_ID" --status awaiting_refs --note "seed complete"
              ;;
            tts)
              node apps/video/scripts/longform/generate-tts.mjs --project "$PROJECT_ID" --report
              node scripts/set-status.mjs --project "$PROJECT_ID" --status awaiting_refs --note "tts regeneration complete"
              ;;
            assemble)
              node apps/video/scripts/longform/assemble-longform.mjs --project "$PROJECT_ID"
              ;;
            publish)
              node apps/video/scripts/longform/publish-longform.mjs --project "$PROJECT_ID"
              ;;
            *)
              echo "Unknown stage: $STAGE" >&2
              exit 1
              ;;
          esac

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: longform-${{ inputs.project_id }}-${{ inputs.stage }}-${{ github.run_id }}
          path: |
            signal-studio/temp/longform/
          if-no-files-found: ignore

      - name: Mark failed
        if: failure()
        run: |
          curl -s -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/content_items?id=eq.${{ inputs.project_id }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"failed\",\"status_note\":\"${{ inputs.stage }} failed — run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
